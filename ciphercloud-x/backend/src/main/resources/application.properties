# ==============================
# Application Configuration
# ==============================
spring.application.name=CipherCloudX
server.port=${PORT:8080}

# ==============================
# Database Configuration (PostgreSQL - Render)
# ==============================
spring.datasource.url=jdbc:postgresql://dpg-d7lks51o3t8c7390sb00-a.singapore-postgres.render.com:5432/ciphercloud_db
spring.datasource.username=ciphercloud_db_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ==============================
# File Upload Configuration
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==============================
# JWT Configuration
# ==============================
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ==============================
# Encryption Configuration
# ==============================
encryption.rsa.public-key=${RSA_PUBLIC_KEY}
encryption.rsa.private-key=${RSA_PRIVATE_KEY}
encryption.master-password=${MASTER_PASSWORD}

# ==============================
# Storage Configuration
# ==============================
storage.local.path=./uploads
storage.primary-provider=BACKBLAZE_B2
storage.backup-provider=SUPABASE
storage.enable-replication=false
storage.max-file-size=104857600

# ==============================
# Backblaze B2 Configuration
# ==============================
storage.backblaze.enabled=true
storage.backblaze.endpoint=https://s3.us-west-004.backblazeb2.com
storage.backblaze.region=us-west-004
storage.backblaze.bucket-name=ciphercloudx-storage
storage.backblaze.key-id=${BACKBLAZE_KEY_ID}
storage.backblaze.application-key=${BACKBLAZE_APP_KEY}

# ==============================
# Supabase Storage Configuration
# ==============================
storage.supabase.enabled=true
storage.supabase.endpoint=https://eqgnvtidjpvpvedehcvp.storage.supabase.co/storage/v1/s3
storage.supabase.region=ap-northeast-2
storage.supabase.bucket-name=CipherCloud
storage.supabase.access-key-id=${SUPABASE_ACCESS_KEY}
storage.supabase.secret-access-key=${SUPABASE_SECRET_KEY}

# ==============================
# Email Configuration (Gmail SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=tushar86sharma98@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.from=tushar86sharma98@gmail.com
app.name=CipherCloud X

# ==============================
# Security
# ==============================
security.max-failed-attempts=5
security.lock-duration-minutes=30

# ==============================
# Logging
# ==============================
logging.level.root=INFO
logging.level.com.ciphercloudx=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n